<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Electronics — Checkout</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; }
.header { background: #1a1a2e; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header span { background: #4f8ef7; color: white; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.container { max-width: 560px; margin: 32px auto; padding: 0 16px; }
.order-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.order-card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 16px; }
.order-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.order-row:last-child { border-bottom: none; font-weight: 700; font-size: 17px; }
.controls { display: flex; gap: 12px; margin-bottom: 20px; }
.controls select, .controls input { flex: 1; padding: 12px 14px; border: 2px solid #e8e8e8; border-radius: 10px; font-size: 15px; background: white; outline: none; }
.controls select:focus, .controls input:focus { border-color: #4f8ef7; }
.recommended-label { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.recommended-label h3 { font-size: 15px; font-weight: 700; }
.recommended-label .badge { background: #fff3cd; color: #856404; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.method-card { background: white; border: 2px solid #e8e8e8; border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px; }
.method-card:hover { border-color: #4f8ef7; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,247,0.15); }
.method-card.selected { border-color: #4f8ef7; background: #f0f6ff; }
.method-card.recommended { border-color: #4f8ef7; background: linear-gradient(135deg, #f0f6ff, #fff); }
.method-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.icon-card { background: #e8f4fd; }
.icon-cash { background: #e8f8e8; }
.icon-bank { background: #fef3e8; }
.icon-wallet { background: #f3e8fe; }
.method-info { flex: 1; }
.method-name { font-weight: 600; font-size: 15px; }
.method-explanation { font-size: 12px; color: #666; margin-top: 3px; }
.method-time { font-size: 11px; background: #f0f0f0; color: #555; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.method-time.instant { background: #e8f8e8; color: #2d7a2d; }
.rank-badge { width: 24px; height: 24px; border-radius: 50%; background: #4f8ef7; color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.see-all-btn { width: 100%; padding: 14px; background: white; border: 2px dashed #d0d0d0; border-radius: 14px; color: #666; font-size: 14px; cursor: pointer; margin-top: 4px; }
.see-all-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }
.all-methods { margin-top: 10px; display: none; }
.all-methods.open { display: block; }
.all-method-row { background: white; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.all-method-row:hover { border-color: #4f8ef7; }
.all-method-row.selected { border-color: #4f8ef7; background: #f0f6ff; }
.loading { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
.confirm-btn { width: 100%; padding: 16px; background: #4f8ef7; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
.confirm-btn:hover { background: #3a7de0; }
.confirm-btn:disabled { background: #ccc; cursor: not-allowed; }
.selected-banner { background: #e8f8e8; border: 1px solid #b8e8b8; border-radius: 10px; padding: 12px 16px; margin-top: 12px; font-size: 13px; color: #2d7a2d; display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>⚡ Zenith Electronics</h1>
  <span>Powered by Yuno</span>
</div>
<div class="container">
  <div class="order-card">
    <h2>Order Summary</h2>
    <div class="order-row"><span>Sony WH-1000XM5 Headphones</span><span>$280.00</span></div>
    <div class="order-row"><span>Shipping</span><span>Free</span></div>
    <div class="order-row"><span>Total</span><span id="total-display">$280.00</span></div>
  </div>
  <div class="controls">
    <select id="country-select" onchange="loadRecommendations()">
      <option value="MX">🇲🇽 Mexico</option>
      <option value="CO">🇨🇴 Colombia</option>
      <option value="AR">🇦🇷 Argentina</option>
    </select>
    <input type="number" id="amount-input" value="280" min="1" max="9999" placeholder="Amount USD" onchange="loadRecommendations()" oninput="updateTotal()" />
  </div>
  <div id="recommendations-section">
    <div class="loading">Loading recommendations...</div>
  </div>
  <div id="selected-banner" class="selected-banner"></div>
  <button class="confirm-btn" id="confirm-btn" disabled onclick="confirmPayment()">Select a payment method to continue</button>
</div>
<script>
let selectedMethod = null;
let allMethodsOpen = false;

function getIcon(type) {
  if (type === 'card') return { emoji: '💳', cls: 'icon-card' };
  if (type === 'cash') return { emoji: '💵', cls: 'icon-cash' };
  if (type === 'bank_transfer') return { emoji: '🏦', cls: 'icon-bank' };
  return { emoji: '👛', cls: 'icon-wallet' };
}

function getTimeLabel(t) {
  if (t === 'instant') return { label: '⚡ Instant', cls: 'instant' };
  if (t === '5min') return { label: '⏱ ~5 min', cls: '' };
  if (t === '2hr') return { label: '🕐 ~2 hours', cls: '' };
  return { label: '📅 ~24 hours', cls: '' };
}

function updateTotal() {
  const amt = document.getElementById('amount-input').value || '0';
  document.getElementById('total-display').textContent = '$' + parseFloat(amt).toFixed(2);
}

function selectMethod(id, name) {
  selectedMethod = { id, name };
  document.querySelectorAll('.method-card, .all-method-row').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('[data-id="' + id + '"]').forEach(el => el.classList.add('selected'));
  const btn = document.getElementById('confirm-btn');
  btn.disabled = false;
  btn.textContent = 'Pay with ' + name;
  const banner = document.getElementById('selected-banner');
  banner.style.display = 'block';
  banner.textContent = '✓ ' + name + ' selected — click below to complete your purchase';
}

function confirmPayment() {
  if (!selectedMethod) return;
  alert('✅ Payment initiated with ' + selectedMethod.name + '!\n\nIn a real checkout, you would now be redirected to complete your payment.');
}

function toggleAllMethods() {
  allMethodsOpen = !allMethodsOpen;
  const el = document.getElementById('all-methods-list');
  const btn = document.getElementById('see-all-btn');
  el.classList.toggle('open', allMethodsOpen);
  btn.textContent = allMethodsOpen ? '▲ Hide all payment methods' : '▼ See all payment methods';
}

async function loadRecommendations() {
  const country = document.getElementById('country-select').value;
  const amount = parseFloat(document.getElementById('amount-input').value) || 280;
  const section = document.getElementById('recommendations-section');
  section.innerHTML = '<div class="loading">Finding best methods for you...</div>';
  try {
    const res = await fetch('http://localhost:3001/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ country, amount })
    });
    const data = await res.json();
    renderRecommendations(data);
  } catch(e) {
    section.innerHTML = '<div class="loading">Could not load recommendations. Is the backend running?</div>';
  }
}

function renderRecommendations(data) {
  const { recommended, all_methods } = data;
  let html = '';
  html += '<div class="recommended-label"><h3>✨ Recommended for you</h3><div class="badge">Smart suggestions</div></div>';
  recommended.forEach(function(m, i) {
    const icon = getIcon(m.type);
    const time = getTimeLabel(m.confirmationTime);
    html += '<div class="method-card recommended" data-id="' + m.id + '" onclick="selectMethod(\'' + m.id + '\',\'' + m.name + '\')">';
    html += '<div class="rank-badge">' + (i+1) + '</div>';
    html += '<div class="method-icon ' + icon.cls + '">' + icon.emoji + '</div>';
    html += '<div class="method-info"><div class="method-name">' + m.name + '</div>';
    html += '<div class="method-explanation">✓ ' + m.explanation + '</div></div>';
    html += '<div class="method-time ' + time.cls + '">' + time.label + '</div></div>';
  });
  html += '<button class="see-all-btn" id="see-all-btn" onclick="toggleAllMethods()">▼ See all payment methods</button>';
  html += '<div class="all-methods" id="all-methods-list">';
  all_methods.forEach(function(m) {
    const icon = getIcon(m.type);
    const time = getTimeLabel(m.confirmationTime);
    html += '<div class="all-method-row" data-id="' + m.id + '" onclick="selectMethod(\'' + m.id + '\',\'' + m.name + '\')">';
    html += '<div class="method-icon ' + icon.cls + '">' + icon.emoji + '</div>';
    html += '<div class="method-info"><div class="method-name">' + m.name + '</div></div>';
    html += '<div class="method-time ' + time.cls + '">' + time.label + '</div></div>';
  });
  html += '</div>';
  document.getElementById('recommendations-section').innerHTML = html;
}

loadRecommendations();
</script>
</body>
</html>
